name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for hardcoded secrets
        run: |
          if grep -rn "gsk_\|sk-\|lsv2_" --include="*.py" .; then
            echo "Possible hardcoded API key found"; exit 1
          fi

      - name: Import check
        run: |
          PYTHONPATH=. python -c "from agent.core import build_agent; print('agent import OK')"
          PYTHONPATH=. python -c "from rag.ingest import ingest_all; print('rag import OK')"
